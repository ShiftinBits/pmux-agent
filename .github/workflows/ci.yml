name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go install mvdan.cc/garble@latest
      - run: go vet ./...
      - run: go test ./...
      - run: go build -ldflags="-X main.version=dev" -o bin/pmux ./cmd/pmux
      - run: make build-obfuscated
